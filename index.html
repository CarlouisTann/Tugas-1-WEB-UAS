<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Input Data</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Form Input Data</h1>
    <p>Silakan isi data pada form di bawah ini.</p>

    <form id="dataForm">
      <div class="form-group">
        <label for="nama">Nama</label>
        <input type="text" id="nama" placeholder="Masukkan nama" required />
      </div>

      <div class="form-group">
        <label for="nim">NIM</label>
        <input
          type="text"
          id="nim"
          placeholder="Masukkan 8 digit NIM"
          maxlength="8"
          pattern="[0-9]{8}"
          inputmode="numeric"
          required
        />
      </div>

      <div class="form-group">
        <label for="layanan">Jenis Layanan</label>
        <select id="layanan" required>
          <option value="">-- Pilih Jenis Layanan --</option>
          <option value="Administrasi">Administrasi</option>
          <option value="Akademik">Akademik</option>
          <option value="Keuangan">Keuangan</option>
          <option value="Lainnya">Lainnya</option>
        </select>
      </div>

      <div class="form-group">
        <label for="keterangan">Keterangan</label>
        <textarea id="keterangan" rows="4" placeholder="Masukkan keterangan (opsional)"></textarea>
      </div>

      <button type="submit">Simpan Data</button>
      <a href="tabel.html" class="btn-link">Lihat Tabel Data</a>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
