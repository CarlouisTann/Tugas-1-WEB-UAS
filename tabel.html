<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabel Data</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Tabel Data</h1>
    <p>Data yang telah diinput akan tampil di tabel berikut.</p>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>NIM</th>
          <th>Jenis Layanan</th>
          <th>Keterangan</th>
        </tr>
      </thead>
      <tbody id="dataTable"></tbody>
    </table>

    <div class="btn-group">
      <a href="index.html" class="btn-link">Kembali ke Form</a>
      <button id="hapusSemua" class="danger">Hapus Semua Data</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
